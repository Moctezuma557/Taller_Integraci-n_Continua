  name: Mi primer github action
  
  on: 
    push:
      branches: ["main"]

  jobs:
    saludo:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout del codigo
          uses: actions/checkout@v4

        - name: Usar NODE JS
          uses: actions/setup-node@v4
          with:
            node-version:'20'

        -name: Construir app con node
         run: npm install

        -name: Verificar si app.js existe
         run: |
            if[! -f "GITHUB_WORKSPACE/app.js"]; then
              echo "No se encontro app.js en la raíz"
              exit 1
            fi
            echo "Se encontro app.js. Continuando con el workflow"